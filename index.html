<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Đơn Hàng</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
    <script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

    <style>
        :root {
            --bg: #050505;
            --surface: #121214; --surface-glass: rgba(20, 20, 24, 0.75);
            --border: rgba(255, 255, 255, 0.08); --text-main: #f4f4f5; --text-sub: #a1a1aa;
            --accent: #f5a623; --accent-glow: rgba(245, 166, 35, 0.3);
            --success: #10b981; --success-glow: rgba(16, 185, 129, 0.6);
            --danger: #ef4444; --info: #3b82f6;
            --radius-lg: 24px; --radius-md: 16px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 50% -10%, var(--accent-glow), transparent 60%); color: var(--text-main); padding: 16px; padding-bottom: 60px; min-height: 100vh; overflow-x: hidden; }
        svg { flex-shrink: 0; }
        
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--surface-glass); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid rgba(255,255,255,0.1); border-top: 1px solid rgba(255,255,255,0.2); padding: 16px; border-radius: var(--radius-lg); margin-bottom: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .user-info { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 52px; height: 52px; border-radius: 18px; background: linear-gradient(135deg, #f5a623, #ea580c); display: flex; justify-content: center; align-items: center; font-size: 22px; font-weight: 800; color: #fff; overflow: hidden; border: 2px solid rgba(255,255,255,0.1); animation: avatarPulse 3s infinite alternate, float 4s ease-in-out infinite; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        @keyframes avatarPulse { 0% { box-shadow: 0 0 10px rgba(245, 166, 35, 0.4), inset 0 0 5px rgba(255,255,255,0.2); } 100% { box-shadow: 0 0 25px rgba(245, 166, 35, 0.8), inset 0 0 10px rgba(255,255,255,0.5); } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        .name { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; text-shadow: 0 0 10px rgba(255,255,255,0.2);}
        .uid { font-size: 12px; color: var(--text-sub); margin-top: 4px; display: flex; align-items: center; gap: 4px; font-weight: 500;}
        .stat { text-align: right; background: rgba(0,0,0,0.3); padding: 8px 12px; border-radius: var(--radius-md); border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);}
        .stat-num { font-size: 20px; font-weight: 800; color: var(--accent); line-height: 1; text-shadow: 0 0 15px var(--accent-glow);}
        .stat-label { font-size: 10px; color: var(--text-sub); font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }

        .metrics-bar { display: flex; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 12px 16px; border-radius: 16px; border: 1px solid rgba(255,255,255,0.04); margin-bottom: 24px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); }
        .metric { font-size: 11px; font-weight: 600; color: var(--text-sub); display: flex; align-items: center; gap: 8px; width: 50%;}
        .metric-val { color: #fff; font-size: 14px; font-weight: 800; text-shadow: 0 0 10px rgba(255,255,255,0.4); }
        .live-dot { width: 8px; height: 8px; background: var(--success); border-radius: 50%; box-shadow: 0 0 10px var(--success); animation: pulseDot 1.5s infinite; }
        @keyframes pulseDot { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(1.3); } 100% { opacity: 1; transform: scale(1); } }
        
        .order-list { display: flex; flex-direction: column; gap: 20px; }
        .card { background: linear-gradient(145deg, rgba(24, 24, 27, 0.8), rgba(15, 15, 18, 0.95)); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.05); border-top: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); box-shadow: 0 8px 20px rgba(0,0,0,0.4); }
        .card.expanded { border-color: rgba(245, 166, 35, 0.5); box-shadow: 0 15px 40px rgba(0,0,0,0.6), 0 0 20px rgba(245, 166, 35, 0.15); transform: translateY(-2px);}
        .card-main { padding: 20px; position: relative; cursor: pointer; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #18181b; padding: 6px 12px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);}
        
        .status { font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 6px; padding: 6px 12px; border-radius: 20px; background: rgba(255,255,255,0.05); letter-spacing: 0.3px;}
        .status.wait { color: var(--accent); background: rgba(245, 166, 35, 0.15); border: 1px solid rgba(245, 166, 35, 0.3); box-shadow: 0 0 10px var(--accent-glow);} 
        .status.deliv { color: var(--info); background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); box-shadow: 0 0 10px rgba(59, 130, 246, 0.3);} 
        .status.danger { color: var(--danger); background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); box-shadow: 0 0 10px rgba(239, 68, 68, 0.3);} 
        .status.success { color: #fff; background: linear-gradient(90deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.3)); border: 1px solid rgba(16, 185, 129, 0.5); text-shadow: 0 0 5px rgba(255,255,255,0.5); animation: badgeSuccessPulse 2s infinite alternate;} 
        @keyframes badgeSuccessPulse { 0% { box-shadow: 0 0 10px rgba(16, 185, 129, 0.4), inset 0 0 5px rgba(16, 185, 129, 0.2); } 100% { box-shadow: 0 0 20px rgba(16, 185, 129, 0.8), inset 0 0 10px rgba(16, 185, 129, 0.5); } }
        
        .product-name { font-size: 18px; font-weight: 700; margin: 14px 0 6px 0; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5);}
        .date { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 6px;}
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 18px; }
        .price { font-size: 20px; font-weight: 800; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow);}
        
        .btn-expand { width: 36px; height: 36px; border-radius: 50%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.3s ease; color: var(--text-sub); border: 1px solid rgba(255,255,255,0.1); box-shadow: inset 0 2px 4px rgba(255,255,255,0.05);}
        .card.expanded .btn-expand { transform: rotate(180deg); background: linear-gradient(135deg, var(--accent), #ea580c); color: #fff; box-shadow: 0 0 15px var(--accent-glow); border-color: transparent;}
        
        .card-detail { max-height: 0; opacity: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease-out, padding 0.3s ease; padding: 0 20px; }
        .card.expanded .card-detail { max-height: 2000px; opacity: 1; padding-bottom: 20px; border-top: 1px dashed rgba(255,255,255,0.1); margin-top: 4px; padding-top: 20px; transition: max-height 0.6s ease-in-out, opacity 0.4s 0.1s ease-in, padding 0.4s ease; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 24px; }
        .info-box { display: flex; flex-direction: column; gap: 6px; background: rgba(0, 0, 0, 0.4); border-top: 1px solid rgba(255,255,255,0.05); border-left: 1px solid rgba(255,255,255,0.02); box-shadow: inset 0 4px 10px rgba(0,0,0,0.6); padding: 12px 14px; border-radius: var(--radius-md);}
        .info-box.full { grid-column: 1 / -1; }
        .info-lbl { font-size: 11px; color: var(--text-sub); font-weight: 600; display: flex; align-items: center; gap: 6px; text-transform: uppercase; letter-spacing: 0.5px;}
        .info-val { font-size: 14px; font-weight: 600; color: #fff; line-height: 1.4; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        
        .section-title { font-size: 13px; color: var(--accent); margin-bottom: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; display: flex; align-items: center; gap: 8px;}
        
        .package { background: linear-gradient(to bottom right, #1a1a1f, #0f0f12); border-radius: var(--radius-lg); padding: 18px; margin-bottom: 16px; border: 1px solid rgba(245, 166, 35, 0.15); border-top: 1px solid rgba(245, 166, 35, 0.4); position: relative; box-shadow: 0 5px 20px rgba(0,0,0,0.5);}
        .package::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px; background: var(--accent); box-shadow: 0 0 15px var(--accent);}
        .pkg-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;}
        .pkg-name { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        .track-code { font-family: monospace; font-size: 13px; color: #60a5fa; background: rgba(59, 130, 246, 0.1); border: 1px solid rgba(59, 130, 246, 0.4); padding: 6px 10px; border-radius: 8px; font-weight: 700; box-shadow: inset 0 0 10px rgba(59, 130, 246, 0.1);}
        .real-product-name { font-size: 14px; color: #fff; font-weight: 600; margin-bottom: 16px; line-height: 1.5; display: flex; gap: 10px; background: rgba(255,255,255,0.03); padding: 12px; border-radius: var(--radius-sm); border: 1px dashed rgba(255,255,255,0.1);}
        .advance-pay { display: flex; justify-content: space-between; align-items: center; font-size: 14px; background: linear-gradient(90deg, rgba(245, 166, 35, 0.1), rgba(245, 166, 35, 0.05)); border: 1px solid rgba(245, 166, 35, 0.3); padding: 14px; border-radius: var(--radius-md); margin-top: 16px; color: var(--accent); font-weight: 700; box-shadow: inset 0 0 15px rgba(245,166,35,0.05);}
        
        /* BẢN ĐỒ VÀ CÁC ICON MỚI DÙNG CSS */
        .map-wrapper { position: relative; width: 100%; height: 350px; border-radius: var(--radius-md); margin-bottom: 20px; overflow: hidden; border: 1px solid rgba(255,255,255,0.08); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); z-index: 1; }
        .tracking-map { width: 100%; height: 100%; background: #0f0f11; }
        .custom-map-marker { background: transparent; border: none; z-index: 10 !important;}
        .leaflet-routing-container { display: none !important; }

        /* ICON SHOP (ĐIỂM BẮT ĐẦU) */
        .map-dot-shop { width: 14px; height: 14px; background: #f5a623; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 15px #f5a623; margin-top: -7px; margin-left: -7px; position: relative; }
        .map-dot-shop::after { content: "Shop"; position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800; color: #f5a623; text-shadow: 0 1px 3px #000, 0 0 5px #000; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(245, 166, 35, 0.3);}

        /* ICON KHÁCH (ĐIỂM ĐẾN) */
        .map-dot-customer { width: 14px; height: 14px; background: #10b981; border-radius: 50%; border: 3px solid #fff; box-shadow: 0 0 15px #10b981; margin-top: -7px; margin-left: -7px; position: relative; display: flex; align-items: center; justify-content: center; }
        .map-dot-customer::before { content: "✓"; color: #fff; font-size: 9px; font-weight: 900; }
        .map-dot-customer::after { content: "Khách"; position: absolute; top: 16px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 800; color: #10b981; text-shadow: 0 1px 3px #000, 0 0 5px #000; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px; border: 1px solid rgba(16, 185, 129, 0.3);}

        /* XE TẢI CHẠY (VỊ TRÍ HIỆN TẠI) */
        .blue-pulse-container { position: absolute; bottom: 0; left: 50%; transform: translate(-50%, 50%); width: 20px; height: 20px; }
        .blue-pulse { position: absolute; width: 100%; height: 100%; background: rgba(66, 133, 244, 0.4); border-radius: 50%; animation: blue-ring 2s ease-out infinite; z-index: 1; }
        .blue-dot { position: relative; width: 10px; height: 10px; background: #4285F4; border-radius: 50%; border: 2px solid #fff; box-shadow: 0 0 8px rgba(66, 133, 244, 0.8); z-index: 3; }
        @keyframes blue-ring { 0% { transform: scale(0.3); opacity: 1; } 80% { transform: scale(1.8); opacity: 0; } 100% { transform: scale(2.2); opacity: 0; } }
        .shopee-marker-label { background: #fff; color: #ee4d2d; border: 1px solid rgba(238, 77, 45, 0.3); padding: 6px 12px; border-radius: 4px; font-size: 11px; font-weight: 800; white-space: nowrap; box-shadow: 0 4px 10px rgba(0,0,0,0.15); position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; gap: 4px; z-index: 10; }
        .shopee-marker-label::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); border-width: 6px 6px 0; border-style: solid; border-color: #fff transparent transparent transparent; }
        .shopee-truck-icon-static { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); font-size: 16px; z-index: 5; filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));}

        .gps-data-panel { position: absolute; bottom: 10px; right: 10px; background: rgba(20, 20, 24, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-sm); padding: 10px 14px; width: 260px; z-index: 1000; font-size: 11px; color: rgba(255,255,255,0.7); }
        .gps-data-panel h4 { margin: 0 0 8px 0; color: #fff; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .gps-data-item { display: flex; justify-content: space-between; margin-bottom: 4px; }
        .gps-data-item .label { font-weight: 600; color: rgba(255,255,255,0.5); }
        .gps-data-item .value { color: #fff; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 160px; }

        /* TIMELINE TRẠNG THÁI */
        .live-tracker { background: rgba(0,0,0,0.6); border-radius: var(--radius-md); padding: 24px 0 24px 0; margin-bottom: 18px; position: relative; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 4px 20px rgba(0,0,0,0.8);}
        .stepper { display: flex; justify-content: space-between; position: relative; margin-bottom: 10px; z-index: 2; padding: 0 14px 24px 14px; }
        .stepper-track { position: absolute; left: 14px; right: 14px; top: 12px; height: 4px; background: #27272a; z-index: -1; border-radius: 4px; box-shadow: inset 0 1px 3px rgba(0,0,0,0.8); }
        .stepper-line-active { position: absolute; left: 0; top: 0; bottom: 0; background: linear-gradient(90deg, var(--accent), var(--success)); transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 0 15px var(--success), 0 0 5px var(--accent); border-radius: 4px;}
        .step { display: flex; flex-direction: column; align-items: center; width: 28px; position: relative; z-index: 3;}
        .step-icon-wrapper { width: 28px; height: 28px; border-radius: 50%; background: #1f1f22; border: 2px solid #3f3f46; display: flex; justify-content: center; align-items: center; transition: all 0.5s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5);}
        .step.active .step-icon-wrapper { border-color: var(--success); background: rgba(16, 185, 129, 0.2); box-shadow: 0 0 15px var(--success-glow), inset 0 0 8px rgba(16, 185, 129, 0.4); color: #fff;}
        .step-label { font-size: 10px; font-weight: 700; color: var(--text-sub); text-align: center; letter-spacing: 0.5px; position: absolute; top: 36px; width: 70px; white-space: nowrap;}
        .step.active .step-label { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.6);}
        .timeline { padding-left: 12px; margin-top: 18px;}
        .tl-item { position: relative; padding-bottom: 18px; padding-left: 24px; }
        .tl-item::before { content: ''; position: absolute; left: 0; top: 5px; width: 10px; height: 10px; border-radius: 50%; background: #3f3f46; border: 2px solid #18181b; box-shadow: 0 0 0 1px #3f3f46; z-index: 2;}
        .tl-item::after { content: ''; position: absolute; left: 4px; top: 14px; bottom: -5px; width: 2px; background: rgba(255,255,255,0.08); z-index: 1;}
        .tl-item:last-child { padding-bottom: 0; }
        .tl-item:last-child::after { display: none; }
        .tl-item.latest::before { background: var(--success); box-shadow: 0 0 15px rgba(16, 185, 129, 0.9), inset 0 0 4px #fff; border-color: #000;}
        .tl-time { color: var(--text-sub); font-size: 11px; margin-bottom: 4px; font-weight: 600;}
        .tl-desc { color: #fff; font-size: 13px; font-weight: 500; line-height: 1.5; text-shadow: 0 1px 2px rgba(0,0,0,0.8);}
        .skeleton { background: linear-gradient(110deg, #1f1f22 8%, #27272a 18%, #1f1f22 33%); border-radius: 8px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }
        .skel-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px;}

        /* CSS POPUP XIN QUYỀN VỊ TRÍ */
        .loc-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 9999; display: none; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .loc-popup { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); border-radius: var(--radius-lg); padding: 24px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.5); transform: translateY(20px); transition: transform 0.3s ease; }
        .loc-icon { font-size: 40px; margin-bottom: 16px; text-shadow: 0 0 20px var(--info); }
        .loc-title { font-size: 18px; font-weight: 800; color: #fff; margin-bottom: 8px; }
        .loc-desc { font-size: 13px; color: var(--text-sub); line-height: 1.5; margin-bottom: 20px; }
        .loc-btns { display: flex; gap: 12px; }
        .loc-btn { flex: 1; padding: 12px; border-radius: var(--radius-md); font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: transform 0.1s; }
        .loc-btn:active { transform: scale(0.95); }
        .loc-btn.allow { background: var(--info); color: #fff; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4); }
        .loc-btn.deny { background: rgba(255,255,255,0.1); color: var(--text-main); }
    </style>
</head>

        <symbol id="icon-box" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></symbol>

        <symbol id="icon-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></symbol>
        <symbol id="icon-check-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></symbol>
        <symbol id="icon-truck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></symbol>
        <symbol id="icon-x-circle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></symbol>
        <symbol id="icon-users-group" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="8.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></symbol>
    </svg>

    <div class="loc-overlay" id="locOverlay">
        <div class="loc-popup" id="locPopup">
            <div class="loc-icon">📍</div>
            <div class="loc-title">Chia sẻ vị trí</div>
            <div class="loc-desc">Cho phép ứng dụng sử dụng vị trí GPS hiện tại của bạn để nhận diện điểm giao hàng tự động.</div>
            <div class="loc-btns">
                <button class="loc-btn deny" onclick="denyLocation()">Để sau</button>
                <button class="loc-btn allow" onclick="allowLocation()">Cho phép</button>
            </div>
        </div>
    </div>

    <div class="header">
        <div class="user-info">
            <div class="avatar" id="uAvatar"></div>
            <div>
                <div class="name" id="uName">Đang tải...</div>
                <div class="uid" id="uId"><svg width="12" height="12"><use href="#icon-user"></use></svg> --------</div>
            </div>
        </div>
        <div class="stat"><div class="stat-num" id="uTotal">-</div><div class="stat-label">Tổng Đơn</div></div>
    </div>

    <div class="metrics-bar">
        <div class="metric"><span class="live-dot"></span><div><span class="metric-val" id="statOnline">1</span> Đang xem</div></div>
        <div class="metric" style="border-left: 1px solid rgba(255,255,255,0.1); padding-left: 16px; width: auto;"><svg width="16" height="16" stroke="var(--info)"><use href="#icon-users-group"></use></svg><div><span class="metric-val" id="statMonthly">1</span> Tháng này</div></div>
    </div>

    <div class="order-list" id="orderList">
        <div class="skel-card"><div style="display:flex; justify-content:space-between;"><div style="width:80px;height:24px;border-radius:12px;" class="skeleton"></div><div style="width:100px;height:24px;border-radius:12px;" class="skeleton"></div></div><div style="width:80%;height:24px;margin-top:16px;" class="skeleton"></div><div style="display:flex; justify-content:space-between; margin-top:16px;"><div style="width:80px;height:28px;" class="skeleton"></div><div style="width:36px;height:36px;border-radius:50%;" class="skeleton"></div></div></div>
    </div>

    <script>
        const API_BASE = "https://hoangngocnguyen.id.vn"; 
        window.trackingMaps = {}; window.trackingMarkers = {}; window.trackingIntervals = {}; window.trackingRoutingControls = {};
        window.userLiveLocation = null; 

        function checkLocationPermission() {
            const asked = localStorage.getItem('loc_asked');
            const granted = localStorage.getItem('loc_granted');
            if (!asked) {
                const overlay = document.getElementById('locOverlay');
                const popup = document.getElementById('locPopup');
                overlay.style.display = 'flex';
                setTimeout(() => { overlay.style.opacity = '1'; popup.style.transform = 'translateY(0)'; }, 10);
            } else if (granted === 'true') {
                requestNativeLocation();
            }
        }

        function allowLocation() {
            closePopup();
            localStorage.setItem('loc_asked', 'true');
            localStorage.setItem('loc_granted', 'true');
            requestNativeLocation();
        }

        function denyLocation() {
            closePopup();
            localStorage.setItem('loc_asked', 'true');
            localStorage.setItem('loc_granted', 'false');
        }

        function closePopup() {
            document.getElementById('locOverlay').style.opacity = '0';
            document.getElementById('locPopup').style.transform = 'translateY(20px)';
            setTimeout(() => document.getElementById('locOverlay').style.display = 'none', 300);
        }

        function requestNativeLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => { window.userLiveLocation = [position.coords.latitude, position.coords.longitude]; },
                    (error) => { console.log("Lỗi GPS:", error); },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }
        }

        function initApp() {
            try {
                checkLocationPermission();
                const tg = window.Telegram.WebApp;
                tg.ready(); tg.expand();
                let attempts = 0;

                const tryFetchData = () => {
                    const initData = tg.initDataUnsafe || {};
                    const user = initData.user;
                    if (user && user.id) {
                        const userId = user.id;
                        document.getElementById('uName').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
                        document.getElementById('uId').innerHTML = `<svg width="12" height="12"><use href="#icon-user"></use></svg> ID: ${userId}`;
                        if (user.photo_url) {
                            document.getElementById('uAvatar').innerHTML = `<img src="${user.photo_url}" alt="avatar">`;
                            document.getElementById('uAvatar').style.background = 'transparent';
                        } else {
                            document.getElementById('uAvatar').innerText = (user.first_name || "K").charAt(0).toUpperCase();
                        }
                        fetchOrders(userId); fetchWebStats(userId);
                        if (!window.statsInterval) window.statsInterval = setInterval(() => fetchWebStats(userId), 15000); 
                        return true;
                    }
                    return false;
                };
                if (!tryFetchData()) {
                    const interval = setInterval(() => {
                        attempts++;
                        if (tryFetchData() || attempts >= 10) clearInterval(interval);
                    }, 200);
                }
            } catch (err) {}
        }
        document.addEventListener("DOMContentLoaded", initApp);
        
        async function fetchTitleFromUrl(url) {
            try {
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                if (data.contents) {
                    const doc = new DOMParser().parseFromString(data.contents, "text/html");
                    let title = doc.querySelector("title") ? doc.querySelector("title").innerText : "";
                    if (title) return title.replace(/\| Shopee Việt Nam/gi, '').replace(/\| Lazada\.vn/gi, '').replace(/Mua ngay /gi, '').trim();
                }
            } catch (e) {}
            return null;
        }

        async function fetchWebStats(uid) {
            try {
                const res = await fetch(`${API_BASE}/api/stats?user_id=${uid}`);
                const data = await res.json();
                document.getElementById('statOnline').innerText = data.online;
                document.getElementById('statMonthly').innerText = data.monthly;
            } catch (e) {}
        }

        async function fetchOrders(id) {
            try {
                const response = await fetch(`${API_BASE}/api/orders?user_id=${id}`);
                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || `Lỗi server ${response.status}`);
                }
                const data = await response.json();
                document.getElementById('uTotal').innerText = data.length;
                renderOrders(data);
            } catch (error) {
                let msg = error.message.includes("Failed to fetch") ? "Lỗi kết nối hoặc sai đường dẫn API." : error.message;
                document.getElementById('orderList').innerHTML = `
                    <div style="text-align:center; padding: 40px; background: rgba(239, 68, 68, 0.1); border-radius: 16px; border: 1px solid rgba(239, 68, 68, 0.3);">
                        <div style="font-size: 24px; margin-bottom: 10px;">🔌</div>
                        <div style="color: var(--danger); font-weight: bold;">LỖI KẾT NỐI API</div>
                        <div style="color: var(--text-sub); font-size: 12px; margin-top: 8px;">${msg}</div>
                    </div>`;
            }
        }

        // HÀM QUÉT VỊ TRÍ SHOP & HUB (CẬP NHẬT ĐỂ BẮT CHỮ "LẤY HÀNG TẠI"...)
        function extractLocationFromStatus(statusText) {
            if (!statusText) return "Trường THPT Tĩnh Gia 2";
            let text = statusText.toLowerCase();
            
            // Tìm các cụm từ gắn liền với Shop hoặc người gửi
            let match = text.match(/(?:người gửi đang chuẩn bị hàng tại|lấy hàng thành công tại|chuẩn bị hàng tại|lấy hàng tại|khu vực của bạn tại|tại trạm giao hàng|giao hàng tại|đang giao tại|tại)\s+([^.]+)/i);
            if (match && match[1]) return match[1].trim().split(' và ')[0].split(' - ')[0].replace(/(soc|hub|lm hub|\.)/gi, '').trim();
            
            // Tìm các cụm từ gắn với Hub trung chuyển
            match = text.match(/(?:đến kho|rời kho phân loại|đến trạm|rời trạm|từ)\s+([^.]+)/i);
            if (match && match[1]) return match[1].replace(/(soc|hub|lm hub|\.)/gi, '').trim();
            
            return text.replace(/(soc|hub|lm hub|\.)/gi, '').trim();
        }

        async function geocodeLocation(queryText) {
            if (!queryText || queryText === 'Trường THPT Tĩnh Gia 2') return null;
            try {
                let res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(queryText)}&countrycodes=vn&limit=1`, { headers: { 'Accept-Language': 'vi' } });
                let data = await res.json();
                if (data && data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            } catch (err) {}
            return null;
        }

        function getShippingStep(stageText) {
            const txt = (stageText || "").toLowerCase();
            if (txt.includes('thành công') || txt.includes('đã giao') || txt.includes('hoàn thành')) return 4;
            if (txt.includes('đang giao') || txt.includes('bưu tá') || txt.includes('đang phát')) return 3;
            if (txt.includes('kho') || txt.includes('hub') || txt.includes('soc') || txt.includes('vận chuyển') || txt.includes('lấy hàng') || txt.includes('trung chuyển')) return 2;
            return 1; // Mặc định là bước 1 (Đã lên đơn/Chuẩn bị hàng)
        }

        // KHỞI TẠO BẢN ĐỒ
        async function initOrderMap(mapId, orderId, statusText, addressText, shopAddressRaw) {
            if (window.trackingMaps[mapId]) {
                setTimeout(() => window.trackingMaps[mapId].invalidateSize(), 300);
                return;
            }
            const mapElement = document.getElementById(mapId);
            if (!mapElement) return;

            let step = getShippingStep(statusText);
            const isDelivered = (step === 4);
            
            // 1. TÌM VỊ TRÍ SHOP (Điểm bắt đầu)
            let shopLoc = [19.3833, 105.7833]; 
            let shopText = extractLocationFromStatus(shopAddressRaw);
            const geoShop = await geocodeLocation(shopText);
            if (geoShop) shopLoc = [geoShop.lat, geoShop.lng];

            // 2. TÌM VỊ TRÍ KHÁCH (Điểm đến)
            let receiverLoc = [19.3833, 105.7833]; 
            if (window.userLiveLocation) {
                receiverLoc = [...window.userLiveLocation];
                addressText = "📍 Vị trí GPS hiện tại của bạn";
            } else {
                let cleanDest = addressText.split(',').map(p => p.trim()).filter(p => p.length > 0).slice(-3).join(', ').replace(/(nhà số|số nhà|ngõ|ngách|hẻm|kiệt|số|ấp|đường|tòa nhà|lô|phòng)\s*[\w/.\-]+/gi, '').trim();
                const geoTarget = await geocodeLocation(cleanDest);
                if (geoTarget) { receiverLoc = [geoTarget.lat, geoTarget.lng]; addressText = cleanDest; }
                else { addressText = "Trường THPT Tĩnh Gia 2 (Mặc định)"; }
            }

            // 3. TÌM VỊ TRÍ XE TẢI (Hiện tại)
            let currentHubLoc = [19.3833, 105.7833]; 
            if (isDelivered) {
                currentHubLoc = [...receiverLoc]; // Đã giao xong -> Xe ở nhà khách
            } else if (step === 1) {
                currentHubLoc = [...shopLoc]; // Đơn đang "Chuẩn bị" -> Xe nằm im ở nhà người gửi (Shop)
            } else {
                let hubText = extractLocationFromStatus(statusText);
                const geoHub = await geocodeLocation(hubText);
                if (geoHub) currentHubLoc = [geoHub.lat, geoHub.lng];
                else currentHubLoc = [...shopLoc]; // Không rõ trạm -> Nằm chờ ở shop
            }

            // VẼ BẢN ĐỒ TỐI (CARTO DARK MATTER)
            var map = L.map(mapId, { zoomControl: false, attributionControl: false }).setView(currentHubLoc, 13);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19 }).addTo(map);

            var routingControl = L.Routing.control({
                waypoints: [ L.latLng(shopLoc[0], shopLoc[1]), L.latLng(receiverLoc[0], receiverLoc[1]) ],
                routeWhileDragging: false, addWaypoints: false, fitSelectedRoutes: true, showAlternatives: false,
                lineOptions: { styles: [{ color: '#f5a623', opacity: 0.8, weight: 3, dashArray: '5, 10' }] }, 
                createMarker: function(idx, waypoint, n) {
                    if (idx === 0) {
                        return L.marker(waypoint.latLng, { icon: L.divIcon({ className: '', html: '<div class="map-dot-shop"></div>', iconSize: [0, 0] }) });
                    } else if (idx === n - 1) {
                        return L.marker(waypoint.latLng, { icon: L.divIcon({ className: '', html: '<div class="map-dot-customer"></div>', iconSize: [0, 0] }) });
                    }
                    return null;
                }
            }).addTo(map);

            // THÊM MARKER XE TẢI LÊN VỊ TRÍ HIỆN TẠI
            let truckOrCheck = isDelivered ? '✅' : '🚚';
            let pulseHtml = (isDelivered || step === 1) ? '' : '<div class="blue-pulse-container"><div class="blue-pulse"></div><div class="blue-dot"></div></div>';
            var truckIcon = L.divIcon({
                className: 'custom-map-marker',
                html: `
                    <div class="shopee-marker-label" id="label_${mapId}">
                        <span style="color:${isDelivered ? '#10b981' : '#ee4d2d'}">●</span> <span class="status-text">${statusText}</span>
                    </div>
                    <div class="shopee-truck-icon-static">${truckOrCheck}</div>
                    ${pulseHtml}
                `, iconSize: [0, 0]
            });
            var truckMarker = L.marker(currentHubLoc, {icon: truckIcon, zIndexOffset: 1000}).addTo(map);
            window.trackingMarkers[mapId] = truckMarker;

            var gpsPanel = L.control({position: 'bottomright'});
            gpsPanel.onAdd = function (map) {
                var div = L.DomUtil.create('div', 'gps-data-panel');
                div.innerHTML = `
                    <h4>Dữ liệu GPS thời gian thực</h4>
                    <div class="gps-data-item"><span class="label">Trạng thái:</span> <span class="value value-live" style="color:${isDelivered ? '#10b981' : '#f5a623'}">${isDelivered ? 'Đã hoàn thành' : (step === 1 ? 'Đang tại Kho' : 'Theo dõi (10s)')}</span></div>
                    <div class="gps-data-item"><span class="label">Khu vực đích:</span> <span class="value" id="address_${mapId}">Đang tải...</span></div>
                `;
                return div;
            };
            gpsPanel.addTo(map);

            window.trackingMaps[mapId] = map;
            window.trackingRoutingControls[mapId] = routingControl;

            setTimeout(() => map.invalidateSize(), 400);
            startLiveTracking(mapId, orderId, receiverLoc, isDelivered, shopLoc);
            if(addressText) document.getElementById(`address_${mapId}`).innerText = addressText;
        }

        function startLiveTracking(mapId, orderId, destLocArray, isAlreadyDelivered, shopLocArray) {
            if (window.trackingIntervals[mapId]) clearInterval(window.trackingIntervals[mapId]);
            if (isAlreadyDelivered) return; 

            window.trackingIntervals[mapId] = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/live_location?order_id=${orderId}`);
                    if (!res.ok) return;
                    const data = await res.json();
                    
                    if (data && data.status) {
                        let step = getShippingStep(data.status);
                        let isDelivered = (step === 4);
                        let newLatLng;

                        if (isDelivered) {
                            newLatLng = L.latLng(destLocArray[0], destLocArray[1]);
                            clearInterval(window.trackingIntervals[mapId]); 
                        } else if (step === 1) {
                            newLatLng = L.latLng(shopLocArray[0], shopLocArray[1]); // Vẫn ở điểm 1 -> Ép dính vào shop
                        } else {
                            let hubText = extractLocationFromStatus(data.status);
                            const geoDataHub = await geocodeLocation(hubText);
                            if(geoDataHub) newLatLng = L.latLng(geoDataHub.lat, geoDataHub.lng);
                        }

                        if(newLatLng) {
                            const marker = window.trackingMarkers[mapId];
                            if (marker) marker.setLatLng(newLatLng); 
                            const labelEl = document.querySelector(`#label_${mapId} span.status-text`);
                            if (labelEl) {
                                labelEl.innerText = data.status;
                                if (isDelivered) labelEl.previousElementSibling.style.color = '#10b981'; 
                            }
                        }
                    }
                } catch (err) {}
            }, 10000);
        }

        function toggleCard(element) {
            const card = element.closest('.card');
            card.classList.toggle('expanded');
            
            if(card.classList.contains('expanded')) {
                const mapElements = card.querySelectorAll('.tracking-map');
                mapElements.forEach(el => {
                    initOrderMap(el.id, el.getAttribute('data-order-id'), el.getAttribute('data-status'), el.getAttribute('data-address'), el.getAttribute('data-shop-raw'));
                });
            } else {
                const mapElements = card.querySelectorAll('.tracking-map');
                mapElements.forEach(el => {
                    if (window.trackingIntervals[el.id]) {
                        clearInterval(window.trackingIntervals[el.id]);
                        delete window.trackingIntervals[el.id];
                    }
                });
            }
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            list.innerHTML = '';
            
            if(!orders || orders.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-sub)">Bạn chưa có đơn hàng nào.</div>`;
                return;
            }

            let fullHtml = "";
            let fetchTasks = [];

            orders.forEach(o => {
                let sttClass = 'wait';
                let sttIcon = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>'; 
        
                let sttLower = o.status.toLowerCase();
                let cleanStatus = o.status.replace(/[✅🚚🔴⏳📦✓🎉]/g, '').trim(); 
                cleanStatus = cleanStatus.charAt(0).toUpperCase() + cleanStatus.slice(1);
                
                if(sttLower.includes('thành công') || sttLower.includes('đã giao')) {
                    sttClass = 'success';
                    sttIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
                } else if(sttLower.includes('giao') || sttLower.includes('vận')) {
                    sttClass = 'deliv';
                    sttIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></svg>';
                } else if(sttLower.includes('hủy')) {
                    sttClass = 'danger';
                    sttIcon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
                }

                let priceFmt = new Intl.NumberFormat('vi-VN').format(o.price) + 'đ';
                let itemsHtml = '';
                
                if(o.items && o.items.length > 0) {
                    o.items.forEach((item, idx) => {
                        let advPay = item.advance_payment > 0 ? `<div class="advance-pay"><span>Thanh toán thêm:</span> <span>${new Intl.NumberFormat('vi-VN').format(item.advance_payment)}đ</span></div>` : '';
                        
                        let historyHtml = '<div class="tl-item"><div class="tl-desc" style="color:var(--text-sub)">Đơn hàng đang chờ xử lý...</div></div>';
                        
                        // LẤY DỮ LIỆU ĐỊA CHỈ SHOP TỪ DÒNG LỊCH SỬ CŨ NHẤT (Dòng cuối cùng của mảng)
                        let shopAddressRaw = "Trường THPT Tĩnh Gia 2"; 
                        if(item.tracking_history && item.tracking_history.length > 0) {
                            historyHtml = item.tracking_history.slice(0, 4).map((hist, hIdx) => `
                                <div class="tl-item ${hIdx === 0 ? 'latest' : ''}"><div class="tl-time">${hist.time}</div><div class="tl-desc">${hist.description}</div></div>
                             `).join('');
                             
                             let oldestHistory = item.tracking_history[item.tracking_history.length - 1];
                             if(oldestHistory && oldestHistory.description) shopAddressRaw = oldestHistory.description;
                        }

                        let current_stage = (item.spx_stage || cleanStatus || 'Đang chờ cập nhật'); 
                        let step = getShippingStep(current_stage);
                        let wPercent = (step === 1) ? "0" : (step === 2) ? "33.33" : (step === 3) ? "66.66" : "100";
                        
                        const labels = ["Chuẩn bị", "Vận chuyển", "Đang giao", "Thành công"];
                        let stepsHtml = labels.map((lbl, i) => {
                            let isCompleted = step > i+1 || (step === 4 && i === 3);
                            let isActive = step >= i+1;
                            let isCurrent = step === i+1;
                            let innerSvg = isCompleted ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>' : '<svg width="8" height="8" viewBox="0 0 24 24" fill="currentColor" stroke="none"><circle cx="12" cy="12" r="6"></circle></svg>';
                            let extraClass = (isCurrent && i === 3) ? 'success-pulse' : '';
                            return `<div class="step ${isActive ? 'active' : ''} ${extraClass}"><div class="step-icon-wrapper">${innerSvg}</div><div class="step-label">${lbl}</div></div>`;
                        }).join('');

                        let stageColor = "var(--text-main)", stageGlow = "none";
                        if(step === 4) { stageColor = "var(--success)"; stageGlow = "0 0 10px rgba(16, 185, 129, 0.5)"; }
                        else if(step === 3) { stageColor = "var(--info)"; stageGlow = "0 0 10px rgba(59, 130, 246, 0.5)"; }
                        else if(step === 2) { stageColor = "var(--accent)"; stageGlow = "0 0 10px rgba(245, 166, 35, 0.5)"; }

                        let mapId = `map_${o.order_id}_${idx}_${Math.random().toString(36).substr(2, 5)}`;
                        let fallbackName = item.product_name || item.name || o.product_name || "Sản phẩm đính kèm";
                        let realNameHtml = item.link && item.link.startsWith("http") ? `<a href="${item.link}" target="_blank" style="color: #fff; text-decoration: none;">🔗 ${fallbackName}</a>` : `<a href="#" style="color: #fff; text-decoration: none;">${fallbackName}</a>`;

                        itemsHtml += `
                            <div class="package">
                                <div class="pkg-head">
                                    <div class="pkg-name"><svg width="16" height="16" stroke="var(--accent)"><use href="#icon-box"></use></svg> KIỆN SỐ ${idx + 1} <span style="color:var(--text-sub); font-weight:normal; font-size:11px; margin-left:4px;">(${item.carrier || 'N/A'})</span></div>
                                    ${item.spx_code ? `<div class="track-code">${item.spx_code}</div>` : '<div style="font-size:11px;color:var(--text-sub)">Đang chờ gán mã</div>'}
                                </div>
                                <div class="real-product-name"><span style="font-size:16px; text-shadow: 0 0 8px rgba(255,255,255,0.6);">🛒</span> ${realNameHtml}</div>
                                <div class="map-wrapper">
                                    <div id="${mapId}" class="tracking-map" data-order-id="${o.order_id}" data-status="${cleanStatus}" data-address="${o.address}" data-shop-raw="${shopAddressRaw}"></div>
                                </div>
                                <div class="live-tracker">
                                    <div style="position: relative; padding: 0 14px; margin-bottom: 28px;"><div class="stepper-track"><div class="stepper-line-active" style="width: ${wPercent}%;"></div></div><div class="stepper">${stepsHtml}</div></div>
                                    <div style="text-align:center; font-size:13px; color:${stageColor}; font-weight:800; text-transform:uppercase; letter-spacing: 0.5px; text-shadow: ${stageGlow};">${current_stage}</div>
                                </div>
                                <div class="timeline">${historyHtml}</div>
                                ${advPay}
                            </div>
                        `;
                    });
                }

                fullHtml += `
                    <div class="card">
                        <div class="card-main" onclick="toggleCard(this)">
                            <div class="flex-between">
                                <div class="badge">#${o.order_id}</div>
                                <div class="status ${sttClass}">${sttIcon} <span>${cleanStatus}</span></div>
                            </div>
                            <div class="product-name">${o.product_name}</div>
                            <div class="date"><svg width="12" height="12"><use href="#icon-clock"></use></svg> ${o.created_at}</div>
                            <div class="price-row"><div class="price">${priceFmt}</div><div class="btn-expand"><svg width="20" height="20"><use href="#icon-down"></use></svg></div></div>
                        </div>
                        <div class="card-detail">
                            <div class="grid-2">
                                <div class="info-box"><div class="info-lbl"><svg width="12" height="12"><use href="#icon-user"></use></svg> Người nhận</div><div class="info-val">${o.receiver_name || '---'}</div></div>
                                <div class="info-box"><div class="info-lbl"><svg width="12" height="12"><use href="#icon-phone"></use></svg> Điện thoại</div><div class="info-val">${o.phone || '---'}</div></div>
                                <div class="info-box full"><div class="info-lbl"><svg width="12" height="12"><use href="#icon-map"></use></svg> Địa chỉ giao hàng</div><div class="info-val">${o.address || '---'}</div></div>
                            </div>
                            <div class="section-title"><svg width="16" height="16" stroke="currentColor"><use href="#icon-box"></use></svg> THÔNG TIN KIỆN HÀNG</div>
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            });
            list.innerHTML = fullHtml;

            fetchTasks.forEach(task => {
                fetchTitleFromUrl(task.url).then(title => {
                    let el = document.getElementById(task.id);
                    if(el) el.innerText = title ? title : task.fallback;
                });
            });
        }
    </script>
</body>
</html>
