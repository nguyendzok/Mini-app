<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quản Lý Đơn Hàng</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --surface: #121214; --surface-glass: rgba(24, 24, 27, 0.7);
            --border: rgba(255, 255, 255, 0.06); --text-main: #f4f4f5; --text-sub: #a1a1aa;
            --accent: #f5a623; --accent-glow: rgba(245, 166, 35, 0.15);
            --success: #10b981; --danger: #ef4444; --info: #3b82f6;
            --radius-lg: 20px; --radius-md: 14px; --radius-sm: 8px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); background-image: radial-gradient(circle at 50% 0%, var(--accent-glow), transparent 60%); color: var(--text-main); padding: 16px; padding-bottom: 60px; min-height: 100vh; }
        svg { flex-shrink: 0; }
        
        /* HEADER */
        .header { display: flex; justify-content: space-between; align-items: center; background: var(--surface-glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid var(--border); padding: 14px 16px; border-radius: var(--radius-lg); margin-bottom: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        .user-info { display: flex; align-items: center; gap: 14px; }
        .avatar { width: 48px; height: 48px; border-radius: 16px; background: linear-gradient(135deg, #f5a623, #ea580c); display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: 800; color: #fff; overflow: hidden; }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .name { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
        .uid { font-size: 12px; color: var(--text-sub); margin-top: 2px; display: flex; align-items: center; gap: 4px;}
        .stat { text-align: right; }
        .stat-num { font-size: 22px; font-weight: 800; color: var(--text-main); line-height: 1; }
        .stat-label { font-size: 10px; color: var(--accent); font-weight: 700; margin-top: 4px; text-transform: uppercase; letter-spacing: 1px; }
        
        /* CARDS */
        .order-list { display: flex; flex-direction: column; gap: 16px; }
        .card { background: var(--surface-glass); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .card.expanded { border-color: rgba(245, 166, 35, 0.3); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
        .card-main { padding: 18px; position: relative; cursor: pointer; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }
        .badge { background: #1f1f22; padding: 4px 10px; border-radius: var(--radius-sm); font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.5px;}
        .status { font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 20px; background: rgba(255,255,255,0.05);}
        .status.success { color: var(--success); background: rgba(16, 185, 129, 0.1); } .status.wait { color: var(--accent); background: rgba(245, 166, 35, 0.1); } .status.deliv { color: var(--info); background: rgba(59, 130, 246, 0.1); } .status.danger { color: var(--danger); background: rgba(239, 68, 68, 0.1); } 
        .product-name { font-size: 17px; font-weight: 700; margin: 12px 0 4px 0; color: #fff; }
        .date { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 4px;}
        .price-row { display: flex; justify-content: space-between; align-items: center; margin-top: 16px; }
        .price { font-size: 18px; font-weight: 800; color: var(--accent); }
        .btn-expand { width: 32px; height: 32px; border-radius: 50%; background: #1f1f22; display: flex; justify-content: center; align-items: center; transition: transform 0.3s ease; color: var(--text-sub); }
        .card.expanded .btn-expand { transform: rotate(180deg); background: var(--accent); color: #000; }
        
        /* CARD DETAIL */
        .card-detail { max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 0 18px; }
        .card.expanded .card-detail { max-height: 3500px; opacity: 1; padding-bottom: 18px; border-top: 1px solid var(--border); margin-top: 4px; padding-top: 18px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .info-box { display: flex; flex-direction: column; gap: 4px; }
        .info-box.full { grid-column: 1 / -1; }
        .info-lbl { font-size: 11px; color: var(--text-sub); font-weight: 500; display: flex; align-items: center; gap: 6px; }
        .info-val { font-size: 13px; font-weight: 600; color: #e4e4e7; background: #18181b; padding: 10px 12px; border-radius: var(--radius-md); border: 1px solid var(--border); line-height: 1.4;}
        .section-title { font-size: 12px; color: var(--text-sub); margin-bottom: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }
        
        /* GÓI HÀNG */
        .package { background: #141417; border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; border: 1px solid var(--border); overflow: hidden; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);}
        .package:last-child { margin-bottom: 0; }
        .pkg-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;}
        .pkg-name { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 6px; }
        .track-code { font-family: monospace; font-size: 12px; color: #fff; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); padding: 4px 8px; border-radius: 6px; font-weight: 600; letter-spacing: 0.5px;}
        .real-product-name { font-size: 14px; color: #fff; font-weight: 600; margin-bottom: 14px; line-height: 1.4; display: flex; gap: 8px;}
        .advance-pay { display: flex; justify-content: space-between; align-items: center; font-size: 13px; background: rgba(245, 166, 35, 0.1); border: 1px solid rgba(245, 166, 35, 0.2); padding: 12px; border-radius: var(--radius-md); margin-top: 14px; color: var(--accent); font-weight: 600;}
        
        /* ================================================== */
        /* CSS ANIMATION ĐỈNH CAO (SIÊU MƯỢT - KHÔNG DÙNG ẢNH) */
        /* ================================================== */
        .live-tracker { background: rgba(0,0,0,0.4); border-radius: var(--radius-md); padding: 24px 12px 20px 12px; margin-bottom: 16px; position: relative; border: 1px solid rgba(255,255,255,0.04); }
        .stepper { display: flex; justify-content: space-between; align-items: flex-end; position: relative; margin-bottom: 10px; z-index: 2;}
        .stepper::before { content: ''; position: absolute; left: 10%; right: 10%; bottom: 12px; height: 2px; background: #27272a; z-index: -1; border-radius: 2px;}
        .stepper-line-active { position: absolute; left: 10%; bottom: 12px; height: 2px; background: linear-gradient(90deg, var(--accent), var(--success)); z-index: -1; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--success); border-radius: 2px;}
        
        .step { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 25%; position: relative;}
        .step-icon-wrapper { width: 26px; height: 26px; border-radius: 50%; background: #1f1f22; border: 2px solid #3f3f46; display: flex; justify-content: center; align-items: center; transition: all 0.4s ease; z-index: 5;}
        .step.active .step-icon-wrapper { border-color: var(--success); background: rgba(16, 185, 129, 0.2); box-shadow: 0 0 12px rgba(16, 185, 129, 0.5); }
        .step-label { font-size: 10px; font-weight: 600; color: var(--text-sub); text-align: center; }
        .step.active .step-label { color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.3);}

        .anim-container { position: absolute; top: -45px; width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; z-index: 10;}
        
        /* 1. HỘP HÀNG 3D (Nhịp đập + Bóng đổ) */
        .css-box { position: relative; width: 20px; height: 20px; background: linear-gradient(135deg, #f5a623 0%, #ea580c 100%); border-radius: 4px; box-shadow: inset 0 -4px 0 rgba(0,0,0,0.2), 0 4px 10px rgba(234, 88, 12, 0.5); animation: boxFloat 1.5s ease-in-out infinite; z-index: 2; }
        .css-box::before { content: ''; position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 100%; background: rgba(255,255,255,0.25); }
        .css-box::after { content: ''; position: absolute; top: 8px; left: 0; width: 100%; height: 2px; background: rgba(0,0,0,0.15); }
        .shadow-pulse { position: absolute; bottom: -2px; width: 16px; height: 4px; background: rgba(0,0,0,0.6); border-radius: 50%; filter: blur(2px); animation: shadowPulse 1.5s ease-in-out infinite; }
        @keyframes boxFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
        @keyframes shadowPulse { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(0.5); opacity: 0.2; } }

        /* 2. XE TẢI GHN/SPX (Lăn bánh + Gió thổi) */
        .css-truck { position: relative; width: 34px; height: 20px; animation: truckMove 0.6s infinite alternate ease-in-out; z-index: 2; }
        .truck-cab { position: absolute; right: 0; bottom: 2px; width: 10px; height: 14px; background: linear-gradient(to bottom, #3b82f6, #1d4ed8); border-radius: 2px 6px 2px 2px; }
        .truck-cab::after { content:''; position:absolute; right:2px; top:2px; width:5px; height:5px; background:#bae6fd; border-radius:1px; }
        .truck-trailer { position: absolute; left: 0; bottom: 2px; width: 22px; height: 18px; background: linear-gradient(135deg, #f8fafc, #e2e8f0); border-radius: 4px 0 0 2px; border-left: 2px solid #3b82f6; display:flex; align-items:center; justify-content:center; box-shadow: inset -2px -2px 5px rgba(0,0,0,0.1);}
        .truck-trailer::after { content: '⚡'; font-size: 10px; color: #f5a623; text-shadow: 0 0 2px rgba(245, 166, 35, 0.5);}
        .truck-wheel { position: absolute; bottom: 0; width: 7px; height: 7px; background: #0f172a; border-radius: 50%; border: 1.5px solid #94a3b8; animation: spin 0.3s linear infinite; }
        .truck-wheel.w1 { left: 4px; } .truck-wheel.w2 { right: 2px; }
        @keyframes truckMove { 0% { transform: translateY(0px) rotate(0deg); } 100% { transform: translateY(-2px) rotate(-1.5deg); } }

        /* 3. XE MÁY SHIPPER (Phóng nhanh + Đèn pha) */
        .css-bike { position: relative; width: 32px; height: 24px; animation: bikeMove 0.5s infinite alternate ease-in-out; z-index: 2; }
        .bike-body { position: absolute; bottom: 4px; left: 6px; width: 18px; height: 7px; background: linear-gradient(to right, #f5a623, #ea580c); border-radius: 10px; }
        .bike-handle { position: absolute; right: 5px; bottom: 9px; width: 2.5px; height: 12px; background: #cbd5e1; transform: rotate(25deg); border-radius: 2px;}
        .bike-headlight { position: absolute; right: -2px; bottom: 14px; width: 4px; height: 4px; background: #fef08a; border-radius: 50%; box-shadow: 3px 0 8px 2px rgba(253, 224, 71, 0.9); }
        .bike-box { position: absolute; left: 2px; bottom: 11px; width: 12px; height: 10px; background: #3b82f6; border-radius: 2px; border-top: 2px solid #93c5fd; box-shadow: inset 0 -2px 0 rgba(0,0,0,0.2);}
        .bike-wheel { position: absolute; bottom: 0; width: 9px; height: 9px; background: #0f172a; border-radius: 50%; border: 2px solid #94a3b8; animation: spin 0.2s linear infinite; }
        .bike-wheel.w1 { left: 2px; } .bike-wheel.w2 { right: 4px; }
        @keyframes bikeMove { 0% { transform: translateY(0px) rotate(3deg); } 100% { transform: translateY(-3px) rotate(-1deg); } }

        /* VỆT GIÓ CHẠY (Dùng chung cho xe tải và xe máy) */
        .wind-lines { position: absolute; left: -20px; top: 60%; width: 12px; height: 1.5px; background: rgba(255,255,255,0.8); border-radius: 2px; animation: wind 0.3s infinite linear; }
        .wind-lines::before { content:''; position: absolute; top: -6px; left: 6px; width: 8px; height: 1.5px; background: rgba(255,255,255,0.5); border-radius: 2px; }
        .wind-lines::after { content:''; position: absolute; top: 6px; left: 2px; width: 10px; height: 1.5px; background: rgba(255,255,255,0.6); border-radius: 2px; }
        @keyframes wind { 0% { transform: translateX(20px); opacity: 1; } 100% { transform: translateX(-25px); opacity: 0; } }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* 4. TICK XANH THÀNH CÔNG (Bung nở + Vẽ nét) */
        .css-success { position: relative; width: 28px; height: 28px; background: linear-gradient(135deg, #10b981, #059669); border-radius: 50%; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); animation: popSuccess 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, pulseSuccess 2s 1s infinite; z-index: 2;}
        .css-success::after { content: ''; width: 6px; height: 12px; border-right: 3px solid white; border-bottom: 3px solid white; transform: rotate(45deg) translate(-1px, -1px); opacity: 0; animation: drawCheck 0.4s 0.5s forwards; }
        @keyframes popSuccess { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        @keyframes drawCheck { 0% { opacity: 0; height: 0; width: 0; } 100% { opacity: 1; height: 12px; width: 6px; } }
        @keyframes pulseSuccess { 0%, 100% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.6); } 50% { box-shadow: 0 0 25px rgba(16, 185, 129, 1); } }

        /* TIMELINE VĂN BẢN */
        .timeline { padding-left: 10px; margin-top: 16px;}
        .tl-item { position: relative; padding-bottom: 16px; padding-left: 20px; }
        .tl-item::before { content: ''; position: absolute; left: 0; top: 4px; width: 8px; height: 8px; border-radius: 50%; background: var(--text-sub); border: 2px solid #18181b; box-shadow: 0 0 0 1px var(--text-sub); z-index: 2;}
        .tl-item::after { content: ''; position: absolute; left: 3px; top: 12px; bottom: -4px; width: 2px; background: var(--border); z-index: 1;}
        .tl-item:last-child { padding-bottom: 0; }
        .tl-item:last-child::after { display: none; }
        .tl-item.latest::before { background: var(--success); box-shadow: 0 0 0 1px var(--success), 0 0 10px rgba(16, 185, 129, 0.5); }
        .tl-time { color: var(--text-sub); font-size: 11px; margin-bottom: 4px; font-weight: 500;}
        .tl-desc { color: #d4d4d8; font-size: 12px; font-weight: 500; line-height: 1.4; }
        
        .skeleton { background: #1f1f22; background: linear-gradient(110deg, #1f1f22 8%, #27272a 18%, #1f1f22 33%); border-radius: 8px; background-size: 200% 100%; animation: 1.5s shine linear infinite; }
        @keyframes shine { to { background-position-x: -200%; } }
        .skel-card { background: var(--surface-glass); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px; display: flex; flex-direction: column; gap: 16px; margin-bottom: 16px;}
        .skel-badge { width: 60px; height: 20px; border-radius: 6px; }
        .skel-title { width: 80%; height: 24px; }
        .skel-date { width: 40%; height: 16px; }
        .skel-price { width: 100px; height: 24px; }
    </style>
</head>
<body>

    <svg style="display:none">
        <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></symbol>
        <symbol id="icon-phone" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></symbol>
        <symbol id="icon-map" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></symbol>
        <symbol id="icon-box" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></symbol>
        <symbol id="icon-clock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></symbol>
        <symbol id="icon-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></symbol>

        <symbol id="icon-truck" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13"></rect><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"></polygon><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle></symbol>
        <symbol id="icon-bike" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="18.5" r="2.5"></circle><circle cx="18.5" cy="18.5" r="2.5"></circle><path d="M15 6a3.5 3.5 0 1 0-7 0"></path><path d="M12 17.5V10l-3-3"></path><path d="M14 10h5l-2 5"></path></symbol>
    </svg>

    <div class="header">
        <div class="user-info">
            <div class="avatar" id="uAvatar"></div>
            <div>
                <div class="name" id="uName">Đang tải...</div>
                <div class="uid" id="uId"><svg width="12" height="12"><use href="#icon-user"></use></svg> --------</div>
            </div>
        </div>
        <div class="stat">
            <div class="stat-num" id="uTotal">-</div>
            <div class="stat-label">Tổng Đơn</div>
        </div>
    </div>

    <div class="order-list" id="orderList">
        <div class="skel-card">
            <div class="flex-between"><div class="skeleton skel-badge"></div><div class="skeleton skel-badge"></div></div>
            <div><div class="skeleton skel-title"></div><div class="skeleton skel-date" style="margin-top:8px"></div></div>
            <div class="flex-between"><div class="skeleton skel-price"></div><div class="skeleton skel-badge" style="width:32px;height:32px;border-radius:50%"></div></div>
        </div>
    </div>

    <script>
        function initApp() {
            try {
                const tg = window.Telegram.WebApp;
                tg.ready(); tg.expand();
                let attempts = 0;
                const tryFetchData = () => {
                    const initData = tg.initDataUnsafe || {};
                    const user = initData.user;
                    if (user && user.id) {
                        const userId = user.id;
                        document.getElementById('uName').innerText = user.first_name + (user.last_name ? " " + user.last_name : "");
                        document.getElementById('uId').innerHTML = `<svg width="12" height="12"><use href="#icon-user"></use></svg> ID: ${userId}`;
                        if (user.photo_url) {
                            document.getElementById('uAvatar').innerHTML = `<img src="${user.photo_url}" alt="avatar">`;
                            document.getElementById('uAvatar').style.background = 'transparent';
                        } else {
                            document.getElementById('uAvatar').innerText = (user.first_name || "K").charAt(0).toUpperCase();
                        }
                        fetchOrders(userId);
                        return true; 
                    }
                    return false; 
                };
                if (!tryFetchData()) {
                    const interval = setInterval(() => {
                        attempts++;
                        if (tryFetchData() || attempts >= 10) clearInterval(interval);
                    }, 200);
                }
            } catch (err) {}
        }
        document.addEventListener("DOMContentLoaded", initApp);

        function extractNameFromLink(url) {
            if (!url) return "Sản phẩm không có link";
            try {
                let u = new URL(url);
                let path = decodeURIComponent(u.pathname);
                if (u.hostname.includes('shopee.vn') || u.hostname.includes('lazada.vn')) {
                    let parts = path.split('/'); let name = parts[1] || "";
                    name = name.replace(/-i\.\d+\.\d+.*$/, ''); name = name.replace(/-i\d+\.html.*$/, ''); name = name.replace(/-/g, ' ');
                    if(name.length > 3) return name.charAt(0).toUpperCase() + name.slice(1);
                }
                return "Sản phẩm đính kèm từ Link";
            } catch(e) { return "Sản phẩm đính kèm"; }
        }

        async function fetchOrders(id) {
            try {
                const response = await fetch(`/api/orders?user_id=${id}`);
                const data = await response.json();
                document.getElementById('uTotal').innerText = data.length;
                renderOrders(data);
            } catch (error) {
                document.getElementById('orderList').innerHTML = `<div style="text-align:center; padding: 40px; color: var(--danger)">❌ Mất kết nối tới máy chủ API Vercel. Vui lòng kiểm tra lại.</div>`;
            }
        }

        function toggleCard(element) {
            const card = element.closest('.card');
            card.classList.toggle('expanded');
        }

        function getShippingStep(stageText) {
            const txt = (stageText || "").toLowerCase();
            if (txt.includes('thành công') && (txt.includes('giao') || txt.includes('phát'))) return 4;
            if (txt.includes('đang giao') || txt.includes('bưu tá')) return 3;
            if (txt.includes('kho') || txt.includes('hub') || txt.includes('soc') || txt.includes('vận chuyển') || txt.includes('lấy hàng thành công') || txt.includes('trung chuyển')) return 2;
            return 1;
        }

        function renderOrders(orders) {
            const list = document.getElementById('orderList');
            list.innerHTML = '';
            
            if(!orders || orders.length === 0) {
                list.innerHTML = `<div style="text-align:center; padding: 40px; color: var(--text-sub)">Bạn chưa có đơn hàng nào.</div>`;
                return;
            }

            orders.forEach(o => {
                let sttClass = 'wait';
                let sttLower = o.status.toLowerCase();
                if(sttLower.includes('thành công') || sttLower.includes('đã giao')) sttClass = 'success';
                else if(sttLower.includes('giao') || sttLower.includes('vận')) sttClass = 'deliv';
                else if(sttLower.includes('hủy')) sttClass = 'danger';

                let priceFmt = new Intl.NumberFormat('vi-VN').format(o.price) + 'đ';

                let itemsHtml = '';
                if(o.items && o.items.length > 0) {
                    o.items.forEach((item, idx) => {
                        let realName = extractNameFromLink(item.link);
                        let advPay = item.advance_payment > 0 ? `<div class="advance-pay"><span>Thanh toán thêm:</span> <span>${new Intl.NumberFormat('vi-VN').format(item.advance_payment)}đ</span></div>` : '';
                        
                        let historyHtml = '<div class="tl-item"><div class="tl-desc">Đơn hàng đang chờ xử lý...</div></div>';
                        if(item.tracking_history && item.tracking_history.length > 0) {
                            historyHtml = item.tracking_history.slice(0, 4).map((hist, hIdx) => `
                                <div class="tl-item ${hIdx === 0 ? 'latest' : ''}">
                                    <div class="tl-time">${hist.time}</div>
                                    <div class="tl-desc">${hist.description}</div>
                                </div>
                            `).join('');
                        }

                        let step = getShippingStep(item.spx_stage);
                        let wPercent = (step === 1) ? 0 : (step === 2) ? 33 : (step === 3) ? 66 : 100;
                        
                        // INJECT CSS ART ANIMATIONS SIÊU MƯỢT VÀO THANH TIẾN TRÌNH
                        let animIcon = "";
                        if(step === 1) animIcon = `<div class="anim-container"><div class="css-box"></div><div class="shadow-pulse"></div></div>`;
                        if(step === 2) animIcon = `<div class="anim-container"><div class="css-truck"><div class="truck-trailer"></div><div class="truck-cab"></div><div class="truck-wheel w1"></div><div class="truck-wheel w2"></div><div class="wind-lines"></div></div></div>`;
                        if(step === 3) animIcon = `<div class="anim-container"><div class="css-bike"><div class="bike-body"></div><div class="bike-handle"></div><div class="bike-headlight"></div><div class="bike-box"></div><div class="bike-wheel w1"></div><div class="bike-wheel w2"></div><div class="wind-lines"></div></div></div>`;
                        if(step === 4) animIcon = `<div class="anim-container"><div class="css-success"></div></div>`;

                        let trackerHtml = `
                            <div class="live-tracker">
                                <div class="stepper">
                                    <div class="stepper-line-active" style="width: ${wPercent}%;"></div>
                                    
                                    <div class="step ${step >= 1 ? 'active' : ''}">
                                        ${step === 1 ? animIcon : ''}
                                        <div class="step-icon-wrapper"><svg width="12" height="12" stroke="currentColor"><use href="#icon-box"></use></svg></div>
                                        <div class="step-label">Chuẩn bị</div>
                                    </div>
                                    <div class="step ${step >= 2 ? 'active' : ''}">
                                        ${step === 2 ? animIcon : ''}
                                        <div class="step-icon-wrapper"><svg width="12" height="12" stroke="currentColor"><use href="#icon-truck"></use></svg></div>
                                        <div class="step-label">Vận chuyển</div>
                                    </div>
                                    <div class="step ${step >= 3 ? 'active' : ''}">
                                        ${step === 3 ? animIcon : ''}
                                        <div class="step-icon-wrapper"><svg width="12" height="12" stroke="currentColor"><use href="#icon-bike"></use></svg></div>
                                        <div class="step-label">Đang giao</div>
                                    </div>
                                    <div class="step ${step >= 4 ? 'active' : ''}">
                                        ${step === 4 ? animIcon : ''}
                                        <div class="step-icon-wrapper"><svg width="14" height="14" stroke="currentColor"><use href="#icon-check"></use></svg></div>
                                        <div class="step-label">Thành công</div>
                                    </div>
                                </div>
                                <div style="text-align:center; font-size:12px; color:var(--accent); margin-top: 14px; font-weight:600; letter-spacing: 0.3px;">
                                    ${item.spx_stage || 'Đang chờ hệ thống cập nhật'}
                                </div>
                            </div>
                        `;

                        itemsHtml += `
                            <div class="package">
                                <div class="pkg-head">
                                    <div class="pkg-name"><svg width="16" height="16" stroke="var(--accent)"><use href="#icon-box"></use></svg> Kiện ${idx + 1} <span style="color:var(--text-sub); font-weight:normal; font-size:11px; margin-left:4px;">(${item.carrier || 'N/A'})</span></div>
                                    ${item.spx_code ? `<div class="track-code">${item.spx_code}</div>` : '<div style="font-size:11px;color:var(--text-sub)">Đang chờ gán mã</div>'}
                                </div>
                                <div class="real-product-name">
                                    <span style="font-size:16px;">🛒</span> 
                                    <a href="${item.link}" target="_blank" style="color: #fff; text-decoration: none;">${realName}</a>
                                </div>
                                
                                ${trackerHtml}
                                
                                <div class="timeline">${historyHtml}</div>
                                ${advPay}
                            </div>
                        `;
                    });
                } else {
                    itemsHtml = '<div style="font-size:12px; color:var(--text-sub); text-align:center; padding: 10px;">Chưa có dữ liệu sản phẩm trong đơn này</div>';
                }

                let card = `
                    <div class="card">
                        <div class="card-main" onclick="toggleCard(this)">
                            <div class="flex-between">
                                <div class="badge">#${o.order_id}</div>
                                <div class="status ${sttClass}">${o.status}</div>
                            </div>
                            <div class="product-name">${o.product_name}</div>
                            <div class="date"><svg width="12" height="12"><use href="#icon-clock"></use></svg> ${o.created_at}</div>
                            <div class="price-row">
                                <div class="price">${priceFmt}</div>
                                <div class="btn-expand"><svg width="18" height="18"><use href="#icon-down"></use></svg></div>
                            </div>
                        </div>

                        <div class="card-detail">
                            <div class="grid-2">
                                <div class="info-box">
                                    <div class="info-lbl"><svg width="12" height="12"><use href="#icon-user"></use></svg> Người nhận</div>
                                    <div class="info-val">${o.receiver_name || '---'}</div>
                                </div>
                                <div class="info-box">
                                    <div class="info-lbl"><svg width="12" height="12"><use href="#icon-phone"></use></svg> Điện thoại</div>
                                    <div class="info-val">${o.phone || '---'}</div>
                                </div>
                                <div class="info-box full">
                                    <div class="info-lbl"><svg width="12" height="12"><use href="#icon-map"></use></svg> Địa chỉ giao hàng</div>
                                    <div class="info-val">${o.address || '---'}</div>
                                </div>
                            </div>
                            <div class="section-title" style="margin-top: 24px; color: var(--accent);">📦 CHI TIẾT KIỆN HÀNG</div>
                            ${itemsHtml}
                        </div>
                    </div>
                `;
                list.innerHTML += card;
            });
        }
    </script>
</body>
</html>
